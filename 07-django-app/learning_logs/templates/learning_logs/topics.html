{% extends "learning_logs/base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">My Topics</h2>
    <a href="{% url 'learning_logs:new_topic' %}" class="btn btn-primary">+ New Topic</a>
</div>

{% if topics %}
<div class="list-group shadow-sm">
    {% for topic in topics %}
    <a href="{% url 'learning_logs:topic' topic.id %}"
        class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
        <span>{{ topic.text }}</span>
        <span class="text-muted small">&rsaquo;</span>
    </a>
    {% endfor %}
</div>
{% else %}
<div class="text-center py-5">
    <div class="fs-1 mb-3">📭</div>
    <p class="text-muted">You haven't added any topics yet.</p>
    <a href="{% url 'learning_logs:new_topic' %}" class="btn btn-primary mt-2">Add your first topic</a>
</div>
{% endif %}
{% endblock content %}
