{% extends "learning_logs/base.html" %}

{% block content %}
{% if form.errors %}
  <p class="error">Username or password is incorrect. Please try again.</p>
{% endif %}

<form action="{% url 'accounts:login' %}" method="post">
  {% csrf_token %}
  {{ form.as_div }}
    <button type="submit">Login</button>
  </form>
{% endblock content %}
